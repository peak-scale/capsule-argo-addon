languageCode: en-us
title: Capsule ❤️ Argo
contentDir: content
enableEmoji: true
enableGitInfo: true
build:
  noJSConfigInAssets: true
module:
  hugoVersion:
    extended: true
    min: 0.100.0
  imports:
    - path: github.com/colinwilson/lotusdocs
      disable: false
    - path: github.com/gohugoio/hugo-mod-bootstrap-scss/v5
      disable: false
markup:
  tableOfContents:
    endLevel: 3
    startLevel: 1
  goldmark:
    renderer:
      unsafe: true
    parser:
      attribute:
        block: true
params:
  google_fonts:
    - - Inter
      - 300, 400, 600, 700
    - - Fira Code
      - 500, 700
  sans_serif_font: Inter
  secondary_font: Inter
  mono_font: Fira Code
  footer:
    copyright: "© :YEAR: [Peak Scale](). All rights reserved."
    version: true
  social:
    github: peak-scale/capsule-argo-addon
    slack: https://kubernetes.slack.com/archives/C03GETTJQRL
  docs:
    title: Capsule ❤️ Argo
    darkMode: true
    prism: true
    repoURL: https://github.com/peak-scale/capsule-argo-addon/docs
    repoBranch: main
    editPage: true
    lastMod: true
    lastModRelative: true
    toc: true
    tocMobile: true
    scrollSpy: true
    sidebarIcons: true
    titleIcon: true
    breadcrumbs: true
    navDesc: true
    navDescTrunc: 30
    listDescTrunc: 100
    backToTop: true
    descriptions: true
    intLinkTooltip: true
    logoLinkURL: https://peakscale.ch/en/
